<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUMA ARTGRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .glow-effect:hover { border-color: #cbd5e1; transform: translateY(-1px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-play text-white"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-900">KUMA ARTGRID</h1>
            </div>
            <div id="syncStatus" class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">데이터 로드 중...</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="premium-card p-5 rounded-2xl">
                <p class="text-xs text-slate-500">총 영상</p>
                <h3 class="text-2xl font-bold" id="totalCount">-</h3>
            </div>
            <div class="premium-card p-5 rounded-2xl">
                <p class="text-xs text-slate-500">최신 코드</p>
                <h3 class="text-2xl font-bold" id="latestCode">-</h3>
            </div>
        </div>

        <div class="mb-6 flex gap-3">
            <input type="text" id="searchInput" placeholder="코드 검색 (예: 60412)" 
                   class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 shadow-sm focus:ring-2 focus:ring-slate-500/20 outline-none">
        </div>

        <div class="space-y-3" id="videoListContainer"></div>
        <div id="noDataMessage" class="hidden text-center py-16 text-slate-400">데이터가 없습니다.</div>

        <div class="mt-12 border-t border-slate-200 pt-8">
            <button onclick="toggleAdminPanel()" class="text-xs text-slate-400 mx-auto block hover:text-slate-600 font-medium">
                영상 관리 도구 <i class="fa-solid fa-chevron-down ml-1"></i>
            </button>
            <div id="adminPanel" class="hidden mt-4 premium-card p-6 rounded-2xl">
                <input type="text" id="adminCode" placeholder="코드" class="w-full mb-3 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm">
                <input type="text" id="adminUrl" placeholder="드라이브 주소" class="w-full mb-3 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm">
                <button onclick="uploadVideo()" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-medium">등록하기</button>
            </div>
        </div>
    </main>

    <div id="customToast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl z-50"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kuma-artgrid';
        let db = null;
        let activeVideos = [];
        let isAdmin = false;

        const LOCAL_STORAGE_KEY = "kuma_artgrid_data";

        const init = async () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const app = initializeApp(JSON.parse(__firebase_config));
                const auth = getAuth(app);
                db = getFirestore(app);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);

                document.getElementById('syncStatus').innerText = "온라인 동기화 중";
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'videos'));
                onSnapshot(q, (snapshot) => {
                    activeVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                    render();
                });
            } else {
                activeVideos = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
                document.getElementById('syncStatus').innerText = "오프라인 모드";
                render();
            }
        };

        const render = (filter = "") => {
            const container = document.getElementById('videoListContainer');
            const noData = document.getElementById('noDataMessage');
            container.innerHTML = "";
            
            const filtered = activeVideos.filter(v => v.code.includes(filter));
            filtered.sort((a, b) => b.code.localeCompare(a.code, undefined, {numeric: true}));

            if(filtered.length === 0) noData.classList.remove('hidden');
            else noData.classList.add('hidden');

            filtered.forEach(v => {
                const div = document.createElement('div');
                div.className = "premium-card p-4 rounded-2xl flex justify-between items-center";
                div.innerHTML = `
                    <div><h4 class="font-bold">${v.code}</h4></div>
                    <div class="flex gap-2">
                        ${isAdmin ? `<button onclick="deleteVideo('${v.id}')" class="text-red-400 px-3"><i class="fa-solid fa-trash"></i></button>` : ''}
                        <a href="${v.url.includes('drive') ? v.url.replace('/view?', '/uc?export=download&') : v.url}" target="_blank" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm">다운로드</a>
                    </div>
                `;
                container.appendChild(div);
            });
            document.getElementById('totalCount').innerText = activeVideos.length + "개";
            document.getElementById('latestCode').innerText = activeVideos[0]?.code || '-';
        };

        window.uploadVideo = async () => {
            const code = document.getElementById('adminCode').value;
            const url = document.getElementById('adminUrl').value;
            if(db) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'videos'), { code, url });
            } else {
                activeVideos.push({ id: Date.now().toString(), code, url });
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                render();
            }
            showToast("등록 완료!");
        };

        window.deleteVideo = async (id) => {
            if(db) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'videos', id));
            else {
                activeVideos = activeVideos.filter(v => v.id !== id);
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                render();
            }
        };

        window.toggleAdminPanel = () => {
            if(!isAdmin) {
                const pass = prompt("비밀번호(1213)");
                if(pass === '1213') { isAdmin = true; render(); document.getElementById('adminPanel').classList.remove('hidden'); }
            } else {
                document.getElementById('adminPanel').classList.toggle('hidden');
            }
        };

        function showToast(msg) {
            const t = document.getElementById('customToast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        }

        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
        init();
    </script>
</body>
</html>
