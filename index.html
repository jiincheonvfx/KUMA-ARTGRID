<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>KUMA ARTGRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-6">KUMA ARTGRID</h1>
        
        <div id="videoListContainer" class="space-y-3 mb-10"></div>

        <div class="border-t pt-10">
            <button onclick="window.openPasswordModal()" class="text-xs text-gray-400 block mx-auto">관리자 도구 열기</button>
            <div id="adminPanel" class="hidden mt-6 bg-white p-6 rounded-xl shadow-sm border">
                <input type="text" id="adminCode" placeholder="코드" class="w-full border p-2 mb-2 rounded">
                <input type="text" id="adminUrl" placeholder="URL" class="w-full border p-2 mb-4 rounded">
                <button onclick="window.processUpload()" class="w-full bg-blue-600 text-white py-2 rounded">등록하기</button>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center">
        <div class="bg-white p-8 rounded-xl">
            <input type="password" id="modalPasswordInput" placeholder="비밀번호" class="border p-2 mb-4 w-full">
            <button onclick="window.verifyAdminPassword()" class="w-full bg-black text-white py-2">인증 확인</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDF0vZjBSt6RQmwP8smbXgtBaky3_5000g",
            authDomain: "kuma-artgrid-d60b7.firebaseapp.com",
            projectId: "kuma-artgrid-d60b7",
            storageBucket: "kuma-artgrid-d60b7.firebasestorage.app",
            messagingSenderId: "765555184972",
            appId: "1:765555184972:web:54ece8610d381cb7c12be9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PATH = `artifacts/kuma-artgrid/public/data/videos`;
        let activeVideos = [];

        // 1. 초기화
        signInAnonymously(getAuth(app)).then(() => {
            onSnapshot(query(collection(db, PATH)), (snapshot) => {
                activeVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.render();
            });
        });

        // 2. 렌더링
        window.render = () => {
            const container = document.getElementById('videoListContainer');
            container.innerHTML = activeVideos.map(v => `
                <div class="bg-white p-4 rounded border flex justify-between">
                    <b>${v.code}</b>
                    <a href="${v.url}" target="_blank" class="text-blue-600">다운로드</a>
                </div>
            `).join('');
        };

        // 3. 관리자 함수 강제 노출
        window.openPasswordModal = () => document.getElementById('passwordModal').classList.remove('hidden');
        
        window.verifyAdminPassword = () => {
            if(document.getElementById('modalPasswordInput').value === '1213') {
                document.getElementById('passwordModal').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } else { alert("비밀번호 틀림"); }
        };

        window.processUpload = async () => {
            const code = document.getElementById('adminCode').value;
            const url = document.getElementById('adminUrl').value;
            await addDoc(collection(db, PATH), { code, url });
            alert("등록 성공!");
        };
    </script>
</body>
</html>
