<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUMA ARTGRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; }
        .animate-fade-in { animation: slideUp 0.25s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen pb-16">

    <header class="border-b bg-white/80 backdrop-blur sticky top-0 z-40">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <h1 class="font-bold">KUMA ARTGRID</h1>
            <div id="syncStatus" class="text-xs text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">온라인 연결 중...</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <input type="text" id="searchInput" placeholder="코드 검색" class="w-full border rounded-xl px-4 py-3 mb-6 outline-none">
        <div class="space-y-3" id="videoListContainer"></div>
        
        <div class="mt-12 border-t pt-8">
            <button onclick="openPasswordModal()" class="text-xs text-slate-400 block mx-auto">관리자 도구 <i class="fa-solid fa-lock"></i></button>
            <div id="adminPanel" class="hidden mt-4 bg-white p-6 rounded-2xl border">
                <input type="hidden" id="editTargetId">
                <input type="text" id="adminCode" placeholder="영상 코드" class="w-full mb-3 border rounded-lg px-3 py-2">
                <input type="text" id="adminUrl" placeholder="링크 주소" class="w-full mb-3 border rounded-lg px-3 py-2">
                <button id="submitBtn" onclick="processUpload()" class="w-full bg-slate-800 text-white py-2 rounded-lg">등록하기</button>
            </div>
        </div>
    </main>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl w-80">
            <input type="password" id="modalPasswordInput" class="w-full border rounded-xl py-3 mb-4 text-center" placeholder="비밀번호">
            <button onclick="verifyAdminPassword()" class="w-full bg-slate-800 text-white py-2 rounded-xl">인증</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDF0vZjBSt6RQmwP8smbXgtBaky3_5000g",
            authDomain: "kuma-artgrid-d60b7.firebaseapp.com",
            projectId: "kuma-artgrid-d60b7",
            storageBucket: "kuma-artgrid-d60b7.firebasestorage.app",
            messagingSenderId: "765555184972",
            appId: "1:765555184972:web:54ece8610d381cb7c12be9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const PATH = `artifacts/kuma-artgrid/public/data/videos`;
        let activeVideos = [];
        let isAdmin = false;

        // 온라인 동기화 시작
        signInAnonymously(getAuth(app)).then(() => {
            onSnapshot(query(collection(db, PATH)), (snapshot) => {
                activeVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            });
        });

        const render = (filter = "") => {
            const container = document.getElementById('videoListContainer');
            container.innerHTML = "";
            activeVideos.filter(v => v.code.includes(filter)).forEach(v => {
                const div = document.createElement('div');
                div.className = "premium-card p-4 rounded-2xl flex justify-between items-center";
                div.innerHTML = `
                    <h4 class="font-bold">${v.code}</h4>
                    <div class="flex gap-2">
                        ${isAdmin ? `<button onclick="deleteVideo('${v.id}')" class="text-red-500 text-xs">삭제</button>` : ''}
                        <a href="${v.url}" target="_blank" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm">다운로드</a>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.processUpload = async () => {
            const code = document.getElementById('adminCode').value;
            const url = document.getElementById('adminUrl').value;
            await addDoc(collection(db, PATH), { code, url });
            alert("등록 완료!");
        };

        window.verifyAdminPassword = () => {
            if(document.getElementById('modalPasswordInput').value === '1213') {
                isAdmin = true;
                document.getElementById('passwordModal').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                render();
            } else { alert("비밀번호 불일치"); }
        };

        window.deleteVideo = async (id) => {
            await deleteDoc(doc(db, PATH, id));
        };

        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
    </script>
</body>
</html>
