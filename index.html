<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUMA ARTGRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .glow-effect:hover { border-color: #cbd5e1; transform: translateY(-1px); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideUp 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen pb-16">

    <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-slate-700 flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-play text-white"></i>
                </div>
                <h1 class="text-lg font-bold text-slate-900">KUMA ARTGRID</h1>
            </div>
            <div id="syncStatus" class="text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">데이터 로드 중...</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        <!-- 1. core 관련 상단 현황판 제거 완료 -->

        <!-- 검색창 -->
        <div class="mb-6 flex gap-3">
            <input type="text" id="searchInput" placeholder="코드 검색 (예: 60412)" 
                   class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 shadow-sm focus:ring-2 focus:ring-slate-500/20 outline-none">
        </div>

        <!-- 비디오 리스트 컨테이너 -->
        <div class="space-y-3" id="videoListContainer"></div>
        <div id="noDataMessage" class="hidden text-center py-16 text-slate-400">데이터가 없습니다.</div>

        <!-- 하단 관리자 도구 버튼 및 숨겨진 업로드 창 -->
        <div class="mt-12 border-t border-slate-200 pt-8">
            <button onclick="openPasswordModal()" class="text-xs text-slate-400 mx-auto block hover:text-slate-600 font-medium">
                영상 관리 도구 <i class="fa-solid fa-chevron-down ml-1"></i>
            </button>
            
            <!-- 비밀번호를 맞추면 노출되는 업로드 패널 -->
            <div id="adminPanel" class="hidden mt-4 premium-card p-6 rounded-2xl">
                <h3 class="text-sm font-bold text-slate-800 mb-3">새 영상 실시간 등록</h3>
                <input type="text" id="adminCode" placeholder="영상 코드 입력" class="w-full mb-3 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-slate-400">
                <input type="text" id="adminUrl" placeholder="영상 링크 주소(URL) 입력" class="w-full mb-3 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-slate-400">
                <button onclick="uploadVideo()" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-medium hover:bg-slate-700">실시간 등록하기</button>
            </div>
        </div>
    </main>

    <!-- 비밀번호 입력 커스텀 모달 (비밀번호 노출 안됨) -->
    <div id="passwordModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl border border-slate-100">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-900 text-base">관리자 인증</h3>
                <button onclick="closePasswordModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <p class="text-xs text-slate-500 mb-4">비밀번호를 입력하시면 업로드 권한이 활성화됩니다.</p>
            <input type="password" id="modalPasswordInput" placeholder="비밀번호 입력" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm mb-4 outline-none focus:border-slate-400">
            <button onclick="checkAdminPassword()" class="w-full bg-slate-800 text-white py-2 rounded-lg text-sm font-medium hover:bg-slate-700">인증하기</button>
        </div>
    </div>

    <!-- 토스트 알림창 -->
    <div id="customToast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl z-50 toast-animate"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 💡 [중요] 시크릿 모드나 다른 환경에서도 실시간 연동이 되게 하려면, 
        // 아래 firebaseConfig에 본인의 실제 Firebase 콘솔 프로젝트 설정값을 직접 넣어주셔야 합니다.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kuma-artgrid';
        let db = null;
        let activeVideos = [];
        let isAdmin = false;

        const LOCAL_STORAGE_KEY = "kuma_artgrid_data";

        const init = async () => {
            // 외부 주입 환경 변수가 있다면 사용하고, 없다면 하드코딩된 firebaseConfig 사용
            const hasEnvConfig = (typeof __firebase_config !== 'undefined' && __firebase_config);
            const finalConfig = hasEnvConfig ? JSON.parse(__firebase_config) : firebaseConfig;

            if (finalConfig && finalConfig.apiKey && finalConfig.apiKey !== "YOUR_API_KEY") {
                const app = initializeApp(finalConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);

                document.getElementById('syncStatus').innerText = "온라인 동기화 중";
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'videos'));
                
                // Firestore 실시간 변경 감지 리스너
                onSnapshot(q, (snapshot) => {
                    activeVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                    render();
                });
            } else {
                // Firebase 세팅이 안 되어 있을 때 작동하는 로컬 대체 모드
                activeVideos = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
                document.getElementById('syncStatus').innerText = "오프라인 로컬 모드";
                render();
            }
        };

        const render = (filter = "") => {
            const container = document.getElementById('videoListContainer');
            const noData = document.getElementById('noDataMessage');
            container.innerHTML = "";
            
            const filtered = activeVideos.filter(v => v.code.includes(filter));
            
            // 3. 코드 번호 기준 '오름차순' 정렬 (작은 숫자부터 차례대로 정렬)
            filtered.sort((a, b) => a.code.localeCompare(b.code, undefined, {numeric: true}));

            if(filtered.length === 0) noData.classList.remove('hidden');
            else noData.classList.add('hidden');

            filtered.forEach(v => {
                const div = document.createElement('div');
                div.className = "premium-card p-4 rounded-2xl flex justify-between items-center";
                div.innerHTML = `
                    <div><h4 class="font-bold text-slate-800">${v.code}</h4></div>
                    <div class="flex gap-2">
                        ${isAdmin ? `<button onclick="deleteVideo('${v.id}')" class="text-red-400 px-3 hover:text-red-600"><i class="fa-solid fa-trash"></i></button>` : ''}
                        <a href="${v.url.includes('drive') ? v.url.replace('/view?', '/uc?export=download&') : v.url}" target="_blank" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm hover:bg-slate-700 transition-colors">다운로드</a>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.uploadVideo = async () => {
            const codeInput = document.getElementById('adminCode');
            const urlInput = document.getElementById('adminUrl');
            const code = codeInput.value.trim();
            const url = urlInput.value.trim();

            if(!code || !url) {
                alert("코드와 영상 주소를 모두 올바르게 입력해주세요.");
                return;
            }

            if(db) {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'videos'), { code, url });
            } else {
                activeVideos.push({ id: Date.now().toString(), code, url });
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                render();
            }

            codeInput.value = "";
            urlInput.value = "";
            showToast("실시간 등록 완료!");
        };

        window.deleteVideo = async (id) => {
            if(!confirm("해당 영상을 정말 삭제하시겠습니까?")) return;
            if(db) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'videos', id));
            } else {
                activeVideos = activeVideos.filter(v => v.id !== id);
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                render();
            }
            showToast("영상이 삭제되었습니다.");
        };

        // 패스워드 모달 제어 함수
        window.openPasswordModal = () => {
            if(isAdmin) {
                document.getElementById('adminPanel').classList.toggle('hidden');
            } else {
                document.getElementById('modalPasswordInput').value = "";
                document.getElementById('passwordModal').classList.remove('hidden');
            }
        };

        window.closePasswordModal = () => {
            document.getElementById('passwordModal').classList.add('hidden');
        };

        window.checkAdminPassword = () => {
            const inputPass = document.getElementById('modalPasswordInput').value;
            if(inputPass === '1213') {
                isAdmin = true;
                closePasswordModal();
                render();
                document.getElementById('adminPanel').classList.remove('hidden');
                showToast("관리자 인증 성공!");
            } else {
                alert("비밀번호가 일치하지 않습니다.");
            }
        };

        // 엔터키 지원
        document.getElementById('modalPasswordInput').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') checkAdminPassword();
        });

        function showToast(msg) {
            const t = document.getElementById('customToast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2500);
        }

        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
        init();
    </script>
</body>
</html>
