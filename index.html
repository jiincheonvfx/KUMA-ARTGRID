<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUMA ARTGRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
        }
        .premium-card { 
            background: #ffffff; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
            transition: all 0.2s ease-in-out; 
        }
        .premium-card:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }
        @keyframes slideUp { 
            from { transform: translateY(20px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .toast-animate { 
            animation: slideUp 0.3s ease-out forwards; 
        }
    </style>
</head>
<body class="min-h-screen pb-16 flex flex-col justify-between">

    <div>
        <header class="border-b border-slate-200 bg-white/80 backdrop-blur sticky top-0 z-40 shadow-sm">
            <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center shadow-md">
                        <i class="fa-solid fa-play text-white text-sm"></i>
                    </div>
                    <h1 class="text-lg font-bold text-slate-900 tracking-wider">KUMA ARTGRID</h1>
                </div>
                <div id="syncStatus" class="text-xs font-semibold text-slate-600 bg-slate-100 px-3 py-1.5 rounded-lg flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-amber-400 animate-pulse"></span> 데이터 로드 중...
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 mt-8">
            <div class="mb-6">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="searchInput" placeholder="영상 코드로 검색하기 (예: 60412)" 
                           class="w-full bg-white border border-slate-200 rounded-2xl pl-11 pr-4 py-3.5 shadow-sm focus:ring-4 focus:ring-slate-500/10 focus:border-slate-400 outline-none transition-all">
                </div>
            </div>

            <div class="space-y-3" id="videoListContainer"></div>
            
            <div id="noDataMessage" class="hidden text-center py-20 premium-card rounded-2xl border-dashed border-2 border-slate-200">
                <i class="fa-solid fa-circle-exclamation text-slate-300 text-4xl mb-3"></i>
                <p class="text-slate-500 font-medium">검색 결과나 등록된 영상이 없습니다.</p>
            </div>

            <div class="mt-12 border-t border-slate-200 pt-8">
                <button onclick="handleAdminTrigger()" class="text-xs text-slate-400 mx-auto flex items-center gap-1.5 hover:text-slate-600 font-medium transition-colors">
                    <i class="fa-solid fa-lock text-[10px]"></i> 영상 관리 도구 <i class="fa-solid fa-chevron-down text-[10px] ml-0.5"></i>
                </button>
                
                <!-- 비밀번호 인증 성공 시에만 노출되는 실시간 업로드 패널 -->
                <div id="adminPanel" class="hidden mt-6 premium-card p-6 rounded-2xl border border-slate-200 bg-slate-50/50">
                    <h3 class="text-sm font-bold text-slate-700 mb-5 flex items-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up text-slate-500"></i> 새 영상 및 링크 실시간 등록
                    </h3>
                    
                    <div class="mb-4">
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5">영상 코드</label>
                        <input type="text" id="adminCode" placeholder="예: 60412" class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-slate-400 transition-all font-semibold">
                    </div>

                    <div class="mb-5">
                        <label class="block text-xs font-semibold text-slate-500 mb-1.5">영상 다운로드 링크 주소</label>
                        <input type="text" id="adminUrl" placeholder="https://drive.google.com/file/d/..." class="w-full bg-white border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-slate-400 transition-all">
                        <p class="text-[11px] text-slate-400 mt-1.5">※ 구글 드라이브 링크를 입력하면 다운로드 주소로 자동 변환되어 연동됩니다.</p>
                    </div>

                    <button onclick="uploadVideo()" id="submitBtn" class="w-full bg-slate-800 hover:bg-slate-900 active:scale-[0.99] transition-all text-white py-3 rounded-xl text-sm font-medium shadow-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-check"></i> 입력한 정보로 실시간 등록하기
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="customToast" class="hidden fixed bottom-6 right-6 bg-slate-900 text-white px-5 py-3.5 rounded-xl shadow-2xl z-50 flex items-center gap-2.5 toast-animate text-sm font-medium">
        <i class="fa-solid fa-circle-check text-emerald-400"></i>
        <span id="toastText">처리되었습니다.</span>
    </div>

    <!-- 비밀번호 입력 전용 안전한 커스텀 모달 (비밀번호 가려짐) -->
    <div id="passwordModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 transform scale-95 transition-all">
            <div class="w-12 h-12 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 mb-4">
                <i class="fa-solid fa-key text-lg"></i>
            </div>
            <h3 class="text-base font-bold text-slate-900 mb-2">관리자 비밀번호 확인</h3>
            <p class="text-xs text-slate-500 mb-4">관리 패널로 진입하기 위해 비밀번호를 입력하세요.</p>
            
            <div class="mb-5">
                <input type="password" id="passwordInput" placeholder="비밀번호 입력" 
                       class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3.5 py-2.5 text-center text-lg tracking-widest font-bold outline-none focus:bg-white focus:border-slate-400 transition-all">
                <p id="passwordError" class="hidden text-xs text-rose-500 mt-2 font-medium text-center">비밀번호가 올바르지 않습니다.</p>
            </div>

            <div class="flex gap-3">
                <button onclick="closePasswordModal()" class="flex-1 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold transition-colors">취소</button>
                <button onclick="submitPassword()" class="flex-1 py-2.5 rounded-xl bg-slate-800 hover:bg-slate-900 text-white text-sm font-semibold transition-colors">인증</button>
            </div>
        </div>
    </div>

    <!-- 커스텀 삭제 확인 모달 -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 transform scale-95 transition-all">
            <div class="w-12 h-12 rounded-full bg-rose-50 flex items-center justify-center text-rose-500 mb-4">
                <i class="fa-solid fa-trash-can text-lg"></i>
            </div>
            <h3 class="text-base font-bold text-slate-900 mb-2">정말 삭제하시겠습니까?</h3>
            <p class="text-sm text-slate-500 mb-6">해당 비디오 정보가 실시간 데이터베이스에서 안전하게 제거됩니다.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-2.5 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-semibold transition-colors">취소</button>
                <button id="modalConfirmBtn" class="flex-1 py-2.5 rounded-xl bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold transition-colors">삭제</button>
            </div>
        </div>
    </div>

    <!-- 커스텀 경고 모달 -->
    <div id="alertModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 transform scale-95 transition-all">
            <div class="w-12 h-12 rounded-full bg-amber-50 flex items-center justify-center text-amber-500 mb-4">
                <i class="fa-solid fa-triangle-exclamation text-lg"></i>
            </div>
            <h3 id="alertTitle" class="text-base font-bold text-slate-900 mb-1">안내</h3>
            <p id="alertMessage" class="text-sm text-slate-500 mb-6">올바른 데이터를 기입하세요.</p>
            <button onclick="closeAlertModal()" class="w-full py-2.5 rounded-xl bg-slate-800 hover:bg-slate-900 text-white text-sm font-semibold transition-colors">확인</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kuma-artgrid';
        let db = null;
        let activeVideos = [];
        let isAdmin = false;
        let deleteTargetId = null;

        const LOCAL_STORAGE_KEY = "kuma_artgrid_data";

        // 시스템 시작 및 데이터 실시간 연동
        const init = async () => {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                try {
                    const app = initializeApp(JSON.parse(__firebase_config));
                    const auth = getAuth(app);
                    db = getFirestore(app);
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    const syncEl = document.getElementById('syncStatus');
                    syncEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 실시간 온라인 동기화 중';
                    
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'videos'));
                    
                    // Firestore 실시간 데이터 리스너 작동 (추가/삭제 시 실시간 자동 새로고침)
                    onSnapshot(q, (snapshot) => {
                        activeVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                        render(document.getElementById('searchInput').value);
                    }, (err) => {
                        console.error("Firestore sync fail:", err);
                    });
                } catch (e) {
                    console.error("Firebase load fail:", e);
                    loadOfflineData();
                }
            } else {
                loadOfflineData();
            }
        };

        // 오프라인 모드 로드
        const loadOfflineData = () => {
            activeVideos = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]');
            const syncEl = document.getElementById('syncStatus');
            syncEl.innerHTML = '<span class="w-2 h-2 rounded-full bg-slate-400"></span> 오프라인 로컬 모드';
            render();
        };

        // 구글 드라이브 다운로드 주소 자동 컨버터
        const convertDriveUrl = (url) => {
            if (url.includes('drive.google.com')) {
                const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://drive.google.com/uc?export=download&id=${match[1]}`;
                }
            }
            return url;
        };

        const render = (filter = "") => {
            const container = document.getElementById('videoListContainer');
            const noData = document.getElementById('noDataMessage');
            container.innerHTML = "";
            
            const filtered = activeVideos.filter(v => v.code.toLowerCase().includes(filter.toLowerCase()));
            
            // 코드를 기준으로 '오름차순(ASC)' 정렬 (작은 것부터 위로)
            filtered.sort((a, b) => a.code.localeCompare(b.code, undefined, {numeric: true}));

            if (filtered.length === 0) {
                noData.classList.remove('hidden');
            } else {
                noData.classList.add('hidden');
            }

            filtered.forEach(v => {
                const div = document.createElement('div');
                div.className = "premium-card p-4 rounded-2xl flex justify-between items-center bg-white border border-slate-100 hover:border-slate-300";
                
                const downloadUrl = convertDriveUrl(v.url);
                
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg bg-slate-50 flex items-center justify-center border border-slate-100">
                            <i class="fa-solid fa-hashtag text-slate-400 text-xs"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-slate-800 text-sm md:text-base">${v.code}</h4>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5">
                        ${isAdmin ? `
                            <button onclick="requestDeleteVideo('${v.id}')" class="text-slate-400 hover:text-rose-500 w-10 h-10 rounded-xl hover:bg-rose-50 flex items-center justify-center transition-all">
                                <i class="fa-solid fa-trash text-sm"></i>
                            </button>
                        ` : ''}
                        <a href="${downloadUrl}" target="_blank" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-semibold flex items-center gap-1.5 active:scale-[0.98] transition-all">
                            <i class="fa-solid fa-arrow-down-to-bracket text-[10px]"></i> 다운로드
                        </a>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        window.uploadVideo = async () => {
            const codeInput = document.getElementById('adminCode');
            const urlInput = document.getElementById('adminUrl');
            const code = codeInput.value.trim();
            const url = urlInput.value.trim();

            if (!code) {
                openAlertModal("입력 오류", "등록하려는 영상 코드를 작성해 주세요.");
                return;
            }
            if (!url) {
                openAlertModal("입력 오류", "등록하려는 영상 링크를 작성해 주세요.");
                return;
            }

            // DB에 등록 반영
            if (db) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'videos'), { code, url });
                    showToast("영상이 실시간으로 업로드 및 등록되었습니다!");
                } catch (e) {
                    console.error(e);
                    openAlertModal("오류", "데이터베이스 저장에 실패했습니다.");
                }
            } else {
                // 오프라인 모드일 때
                activeVideos.push({ id: Date.now().toString(), code, url });
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                render(document.getElementById('searchInput').value);
                showToast("오프라인 모드로 데이터가 등록되었습니다.");
            }

            // 입력 폼 초기화
            codeInput.value = "";
            urlInput.value = "";
        };

        // 영상 삭제 동기화 요청
        window.requestDeleteVideo = (id) => {
            deleteTargetId = id;
            openConfirmModal();
        };

        const confirmDeleteVideo = async () => {
            if (!deleteTargetId) return;

            if (db) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'videos', deleteTargetId));
                    showToast("영상이 실시간으로 삭제되었습니다.");
                } catch (e) {
                    console.error(e);
                    openAlertModal("오류", "데이터베이스에서 삭제하는 데 실패했습니다.");
                }
            } else {
                activeVideos = activeVideos.filter(v => v.id !== id);
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(activeVideos));
                render(document.getElementById('searchInput').value);
                showToast("로컬 리스트에서 제거되었습니다.");
            }

            closeConfirmModal();
        };

        window.handleAdminTrigger = () => {
            if (!isAdmin) {
                openPasswordModal();
            } else {
                document.getElementById('adminPanel').classList.toggle('hidden');
            }
        };

        function openPasswordModal() {
            document.getElementById('passwordInput').value = "";
            document.getElementById('passwordError').classList.add('hidden');
            document.getElementById('passwordModal').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('passwordInput').focus();
            }, 100);
        }

        window.closePasswordModal = () => {
            document.getElementById('passwordModal').classList.add('hidden');
        };

        window.submitPassword = () => {
            const inputVal = document.getElementById('passwordInput').value;
            if (inputVal === '1213') {
                isAdmin = true;
                closePasswordModal();
                render(document.getElementById('searchInput').value);
                document.getElementById('adminPanel').classList.remove('hidden');
                showToast("관리자 인증에 성공했습니다.");
            } else {
                document.getElementById('passwordError').classList.remove('hidden');
                document.getElementById('passwordInput').value = "";
                document.getElementById('passwordInput').focus();
            }
        };

        // Enter 키 입력 시 확인 처리 추가
        document.getElementById('passwordInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                submitPassword();
            }
        });

        // 토스트 알림창 노출
        function showToast(msg) {
            const t = document.getElementById('customToast');
            const txt = document.getElementById('toastText');
            txt.innerText = msg;
            t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 3500);
        }

        // 삭제 확인 모달 제어
        function openConfirmModal() {
            const modal = document.getElementById('confirmModal');
            modal.classList.remove('hidden');
            document.getElementById('modalConfirmBtn').onclick = confirmDeleteVideo;
        }

        window.closeConfirmModal = () => {
            document.getElementById('confirmModal').classList.add('hidden');
            deleteTargetId = null;
        };

        // 커스텀 경고 모달 제어
        function openAlertModal(title, msg) {
            document.getElementById('alertTitle').innerText = title;
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('alertModal').classList.remove('hidden');
        }

        window.closeAlertModal = () => {
            document.getElementById('alertModal').classList.add('hidden');
        };

        // 실시간 검색 연동 및 시스템 가동
        document.getElementById('searchInput').oninput = (e) => render(e.target.value);
        init();
    </script>
</body>
</html>
