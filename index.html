<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUMA ARTGRID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
        .premium-card { background: #ffffff; border: 1px solid #e2e8f0; padding: 1rem; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <h1 class="text-xl font-bold mb-4">KUMA ARTGRID</h1>
        <div id="videoListContainer" class="space-y-2"></div>

        <div class="mt-10 border-t pt-5">
            <button onclick="openPasswordModal()" class="text-sm text-gray-500">관리자 도구</button>
            <div id="adminPanel" class="hidden mt-4 p-4 border rounded bg-white">
                <input type="hidden" id="editTargetId">
                <input type="text" id="adminCode" placeholder="코드" class="w-full mb-2 p-2 border rounded">
                <input type="text" id="adminUrl" placeholder="링크" class="w-full mb-2 p-2 border rounded">
                <button id="submitBtn" onclick="processUpload()" class="w-full bg-black text-white p-2 rounded">등록</button>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-5 rounded">
            <input type="password" id="modalPasswordInput" placeholder="비밀번호" class="p-2 border mb-2 w-full">
            <button onclick="verifyAdminPassword()" class="w-full bg-blue-600 text-white p-2">인증</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDF0vZjBSt6RQmwP8smbXgtBaky3_5000g",
            authDomain: "kuma-artgrid-d60b7.firebaseapp.com",
            projectId: "kuma-artgrid-d60b7",
            storageBucket: "kuma-artgrid-d60b7.firebasestorage.app",
            messagingSenderId: "765555184972",
            appId: "1:765555184972:web:54ece8610d381cb7c12be9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let isAdmin = false;
        let activeVideos = [];

        signInAnonymously(getAuth(app)).then(() => {
            onSnapshot(query(collection(db, 'videos')), (snap) => {
                activeVideos = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        });

        window.render = () => {
            const container = document.getElementById('videoListContainer');
            container.innerHTML = "";
            activeVideos.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true})).forEach(v => {
                container.innerHTML += `
                    <div class="premium-card">
                        <span>${v.code}</span>
                        <div>
                            ${isAdmin ? `<button onclick="editVideo('${v.id}')" class="text-blue-500 mr-2">수정</button><button onclick="deleteVideo('${v.id}')" class="text-red-500 mr-2">삭제</button>` : ''}
                            <a href="${v.url}" target="_blank" class="bg-gray-800 text-white px-3 py-1 rounded text-sm">다운로드</a>
                        </div>
                    </div>`;
            });
        };

        window.processUpload = async () => {
            const id = document.getElementById('editTargetId').value;
            const data = { code: document.getElementById('adminCode').value, url: document.getElementById('adminUrl').value };
            if (id) await updateDoc(doc(db, 'videos', id), data);
            else await addDoc(collection(db, 'videos'), data);
            document.getElementById('adminCode').value = ""; document.getElementById('adminUrl').value = "";
        };

        window.editVideo = (id) => {
            const v = activeVideos.find(x => x.id === id);
            document.getElementById('editTargetId').value = v.id;
            document.getElementById('adminCode').value = v.code;
            document.getElementById('adminUrl').value = v.url;
            document.getElementById('submitBtn').innerText = "수정 완료";
        };

        window.deleteVideo = (id) => deleteDoc(doc(db, 'videos', id));
        window.openPasswordModal = () => document.getElementById('passwordModal').classList.remove('hidden');
        window.verifyAdminPassword = () => {
            if(document.getElementById('modalPasswordInput').value === '1213') {
                isAdmin = true;
                document.getElementById('passwordModal').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                render();
            }
        };
    </script>
</body>
</html>
