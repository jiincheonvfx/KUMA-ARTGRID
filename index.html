<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 💡 [중요] 여기에 본인의 실제 Firebase 콘솔에서 발급받은 설정값을 직접 넣어주세요.
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const appId = 'kuma-artgrid';
        let db = null;
        let activeVideos = [];
        let isAdmin = false;

        const init = async () => {
            try {
                // 환경 변수 검사 없이 무조건 Firebase 서버에 직접 연결하도록 수정
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                
                await signInAnonymously(auth);

                document.getElementById('syncStatus').innerText = "온라인 동기화 중";
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'videos'));
                
                onSnapshot(q, (snapshot) => {
                    activeVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    render();
                });
            } catch (error) {
                console.error("Firebase 연결 실패:", error);
                document.getElementById('syncStatus').innerText = "서버 연결 오류";
            }
        };

        // ... (나머지 render, uploadVideo, deleteVideo 등의 함수는 이전과 동일)
